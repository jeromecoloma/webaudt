name: Bug report
description: Report a defect in webaudt
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: webaudt version
      description: Output of `webaudt --version` (or commit SHA if built from source).
      placeholder: e.g. v0.2.0 or commit dd141b6
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: e.g. macOS 15.5 (arm64), Ubuntu 24.04 (amd64)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. webaudt add ...
        2. webaudt refresh
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Paste output. Redact any paths or names you don't want public.
      render: shell
